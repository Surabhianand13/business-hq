services:
  - type: web
    name: business-hq-backend
    env: node
    buildCommand: cd business-hq/backend && npm install
    startCommand: cd business-hq/backend && node index.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: business-hq-db
          property: connectionString

databases:
  - name: business-hq-db
    plan: free
