services:
  - type: web
    name: business-hq-backend
    env: node
    buildCommand: npm run install-deps && npm run build
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: business-hq-db
          property: connectionString

databases:
  - name: business-hq-db
    plan: free
